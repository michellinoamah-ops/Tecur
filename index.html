<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tecur App</title>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
      import React from 'https://esm.sh/react@18';
      import ReactDOM from 'https://esm.sh/react-dom@18/client';
      
      // We are fetching your code directly here
      async function loadApp() {
        const response = await fetch('./App.jsx');
        const code = await response.text();
        const transformedCode = Babel.transform(code, { presets: ['react'] }).code;
        
        // This runs your translated code
        const script = document.createElement('script');
        script.type = 'module';
        script.text = transformedCode;
        document.head.appendChild(script);
      }

      loadApp();
    </script>
  </body>
</html>
